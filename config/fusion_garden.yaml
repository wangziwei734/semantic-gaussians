scene:
  scene_path: "/root/projects/semantic-gaussians/dataset/mipnerf360/garden"
  dataset_name: "mipnerf360"
  test_cameras: False
  colmap_images: "images_4"
  colmap_eval_hold: 8
  downscale_ratio: 1
  white_background: False
  device: "cuda:0"
  
pipeline:
  convert_shs_python: False
  compute_cov3d_python: False
  debug: False
  seed: 0

model:
  sh_degree: 3
  model_dir: "./output/garden_replication"
  dynamic: False
  load_iteration: -1
  device: "cuda:0"

fusion:
  img_dim: [1297, 840]
  num_workers: 8
  model_2d: samclip # choose from openseg, lseg, samclip, vlpart
  depth: render # choose from image, render, surface, none
  depth_scale: 1000.0
  visibility_threshold: 0.05
  cut_boundary: 10
  n_split_points: 999999999 # train: 80000, eval: 999999999 (large enough)
  num_rand_file_per_scene: 1 # train: 5, eval: 1
  out_dir: "./output/garden_replication"
